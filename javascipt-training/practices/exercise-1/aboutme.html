<!DOCTYPE html>
<html>
 <head>
  <meta charset="utf-8"/>
  <title>About Me</title>
  <style>
    .listitem {
      color: red;
    }
  </style>
</head>
<body>
  <h1>About Me</h1>
  
  <ul>
    <li>Nickname: <span id="nickname"></span>
    <li>Favorites:  <span id="favorites"></span>
    <li>Hometown: <span id="hometown"></span>
   </ul>
  
 </body>
 <script>
  document.body.style.fontFamily = 'Arial, sans-serif';
  document.getElementById('nickname').innerHTML = 'Long';
  document.getElementById('favorites').innerHTML = '25';
  document.getElementById('hometown').innerHTML = 'Long, VN';
  var items = document.getElementsByTagName('li');
  for (var i = 0; i < items.length; i++) {
      items[i].className = 'listitem';
   }
    
    var Pic = document.createElement('img');
    Pic.src = 'https://img.tripi.vn/cdn-cgi/image/width=700,height=700/https://gcs.tripi.vn/public-tripi/tripi-feed/img/482752AXp/anh-mo-ta.png';
    document.body.appendChild(Pic);
 </script>
</html>
