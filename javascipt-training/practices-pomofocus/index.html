<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomofocus</title>
    <script src="index.js" defer></script>
  </head>
  <body>
    <h1>Pomofocus</h1>
    <button id="showTaskFormBtn">Add Task</button>

    <div id="taskFormContainer">
      <input type="text" id="taskNameInput" placeholder="What are you working on?"/>
      <input type="number" id="estPomodorosInput" value="1" min="1" />

      <button id="cancelTaskBtn">Cancel</button>
      <button id="saveTaskBtn">Save</button>
    </div>

    <h2>Tasks List</h2>
    <ul id="taskList"></ul>
  </body>
</html>
